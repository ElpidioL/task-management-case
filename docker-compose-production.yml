services:
  backend:
    build:
      context: "./backend"
      dockerfile: "docker/application/Dockerfile"
    env_file:
      - "./backend/config/.env.production"
    command: bash -c "python manage.py migrate && gunicorn config.wsgi -b 0.0.0.0:8000 -w 4 --log-level debug --capture-output --access-logfile /var/log/gunicorn_access.log --error-logfile /var/log/gunicorn_error.log"
    volumes:
      - ./media:/usr/src/app/media
      - ./logs:/var/log
      - ./static:/static:ro
    expose:
      - "8000"
    restart: always

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend/dist:/app/dist
    env_file:
      - ./frontend/.env.production
    command: npm run build
    restart: "no"

  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./media:/usr/src/app/media
      - ./static:/usr/src/app/static:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
      - ./docker/nginx:/etc/nginx/conf.d:ro
    command: "nginx -g 'daemon off;'"
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"